<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مكسب كاش | KOBBTAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:    #f0b429;
  --gold2:   #d4920a;
  --gold3:   #ffd56b;
  --bg:      #07080f;
  --bg2:     #0d0f1a;
  --bg3:     #141827;
  --border:  rgba(240,180,41,0.18);
  --border2: rgba(255,255,255,0.06);
  --text:    #eef0f8;
  --muted:   #7a82a0;
  --green:   #1ecb7b;
  --red:     #ff4d6d;
  --purple:  #b57bee;
  --card-sh: 0 8px 32px rgba(0,0,0,0.4);
}

*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ════ NOISE TEXTURE ════ */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.5;
}

/* ════ LOADING ════ */
#loading-screen {
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.8rem;
}
.loader-logo {
  font-size:2.5rem;font-weight:900;color:var(--gold);
  letter-spacing:2px;
  animation:logoBreath 2s ease-in-out infinite;
}
@keyframes logoBreath{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
.loader-bar {
  width:180px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;
}
.loader-bar-fill {
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold2),var(--gold),var(--gold3));
  border-radius:2px;
  animation:loadBar 1.8s ease-in-out forwards;
}
@keyframes loadBar{to{width:100%}}
.loader-text{color:var(--muted);font-size:.9rem}

/* ════ ERROR ════ */
#error-screen {
  display:none;position:fixed;inset:0;z-index:9998;
  background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem;
}
#error-screen.show{display:flex}

/* ════ INTRO ════ */
#intro-overlay {
  position:fixed;inset:0;z-index:9000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
.intro-glow {
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(240,180,41,.08) 0%,transparent 70%);
  pointer-events:none;
}
.intro-particles{position:absolute;inset:0;pointer-events:none}
.intro-phase{
  display:none;flex-direction:column;align-items:center;gap:1.4rem;
  animation:phaseIn .7s cubic-bezier(.22,1,.36,1) both;
  position:relative;z-index:2;text-align:center;padding:2rem;
  max-width:400px;
}
.intro-phase.active{display:flex}
@keyframes phaseIn{
  from{opacity:0;transform:translateY(30px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes phaseOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(-25px)}
}
.intro-phase.exit{animation:phaseOut .5s ease forwards}
.intro-big-icon{font-size:4.5rem;filter:drop-shadow(0 0 24px rgba(240,180,41,.5))}
.intro-title{
  font-size:clamp(2rem,8vw,3rem);font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.2;
}
.intro-sub{font-size:1rem;color:var(--muted);line-height:1.6}
.intro-divider{
  width:80px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.intro-cta {
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border:none;
  padding:.95rem 2.4rem;
  border-radius:50px;
  font-size:1.1rem;font-weight:800;font-family:'Tajawal',sans-serif;
  cursor:pointer;
  box-shadow:0 0 30px rgba(240,180,41,.4),0 4px 16px rgba(0,0,0,.3);
  transition:transform .2s,box-shadow .2s;
  animation:ctaPulse 2.5s ease-in-out infinite;
}
@keyframes ctaPulse{
  0%,100%{box-shadow:0 0 20px rgba(240,180,41,.4),0 4px 16px rgba(0,0,0,.3)}
  50%{box-shadow:0 0 40px rgba(240,180,41,.65),0 4px 20px rgba(0,0,0,.4)}
}
.intro-cta:hover{transform:scale(1.04)}
.intro-progress{display:flex;gap:.6rem}
.intro-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.15);
  transition:background .3s;
}
.intro-dot.active{background:var(--gold)}
.countdown-strip{
  width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;
}
.countdown-fill{
  height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));
  border-radius:2px;transition:width .1s linear;
}
.intro-skip{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  background:none;border:none;color:var(--muted);
  font-family:'Tajawal',sans-serif;font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;gap:.3rem;
  transition:color .2s;
}
.intro-skip:hover{color:var(--text)}

/* ════ MAIN APP ════ */
#app{display:none;min-height:100vh;position:relative;z-index:1}
#app.show{display:block;animation:appFade .8s ease}
@keyframes appFade{from{opacity:0}to{opacity:1}}

/* ════ NAVBAR ════ */
.navbar {
  position:sticky;top:0;z-index:200;
  background:rgba(7,8,15,.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  padding:.85rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-brand {
  display:flex;align-items:center;gap:.6rem;
  font-size:1.15rem;font-weight:900;color:var(--gold);
  letter-spacing:.5px;
}
.nav-brand-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:dotPulse 2s ease infinite;
}
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 4px var(--green)}
  50%{box-shadow:0 0 12px var(--green)}
}
.nav-user {
  display:flex;align-items:center;gap:.6rem;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border2);
  padding:.45rem .9rem;border-radius:50px;
  font-size:.85rem;color:var(--muted);
  max-width:200px;
}
.nav-avatar {
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:900;color:#000;
  flex-shrink:0;
}
.nav-name{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-weight:600;color:var(--text);font-size:.85rem;
}

/* ════ CONTENT WRAPPER ════ */
.wrap {
  max-width:860px;
  margin:0 auto;
  padding:1.5rem 1rem 4rem;
}

/* ════ HERO CARD ════ */
.hero-card {
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);
  border-radius:24px;
  padding:1.8rem;
  margin-bottom:1.2rem;
  position:relative;
  overflow:hidden;
  box-shadow:var(--card-sh);
}
.hero-card::before {
  content:'';
  position:absolute;top:-40%;right:-15%;
  width:320px;height:320px;
  background:radial-gradient(circle,rgba(240,180,41,.05) 0%,transparent 70%);
  pointer-events:none;
}
.hero-card::after {
  content:'';
  position:absolute;bottom:-30%;left:-10%;
  width:250px;height:250px;
  background:radial-gradient(circle,rgba(99,102,241,.04) 0%,transparent 70%);
  pointer-events:none;
}
.hero-top {
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.4rem;
}
.avatar-ring {
  width:68px;height:68px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;font-weight:900;color:#000;
  box-shadow:0 0 20px rgba(240,180,41,.25),0 0 0 3px rgba(240,180,41,.2);
  position:relative;z-index:1;
}
.hero-info{flex:1;min-width:0}
.hero-name{
  font-size:1.2rem;font-weight:800;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hero-id{color:var(--muted);font-size:.78rem;margin-top:.2rem}
.badges{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.45rem}
.badge {
  padding:.18rem .55rem;
  border-radius:50px;
  font-size:.68rem;font-weight:700;
}
.badge-vip{background:linear-gradient(135deg,rgba(181,123,238,.25),rgba(99,102,241,.25));color:var(--purple);border:1px solid rgba(181,123,238,.3)}
.badge-level{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.badge-streak{background:rgba(255,77,109,.12);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.badge-rank{background:rgba(30,203,123,.1);color:var(--green);border:1px solid rgba(30,203,123,.25)}

/* Balance */
.balance-block{
  display:flex;align-items:flex-end;gap:.6rem;
  margin-bottom:1.2rem;
}
.balance-num {
  font-size:3rem;font-weight:900;
  color:var(--gold);line-height:1;
  text-shadow:0 0 30px rgba(240,180,41,.25);
  font-variant-numeric:tabular-nums;
}
.balance-unit{font-size:.95rem;color:var(--muted);padding-bottom:.3rem}

/* Mini Stats */
.mini-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:.75rem;margin-bottom:1.2rem;
}
.mstat {
  background:rgba(255,255,255,.03);
  border:1px solid var(--border2);
  border-radius:14px;padding:.8rem;text-align:center;
}
.mstat-val{font-size:1.2rem;font-weight:700;color:var(--gold)}
.mstat-lbl{font-size:.68rem;color:var(--muted);margin-top:.2rem}

/* XP */
.xp-wrap{margin-top:.4rem}
.xp-labels{
  display:flex;justify-content:space-between;
  font-size:.76rem;color:var(--muted);margin-bottom:.4rem;
}
.xp-track {
  height:7px;background:rgba(255,255,255,.06);
  border-radius:4px;overflow:hidden;
}
.xp-fill {
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold2),var(--gold),var(--gold3));
  border-radius:4px;
  transition:width 1.2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 8px rgba(240,180,41,.4);
}

/* ════ QUICK STATS GRID ════ */
.stats-grid {
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:.85rem;margin-bottom:1.2rem;
}
.stat-card {
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border2);
  border-radius:18px;padding:1.1rem;
  position:relative;overflow:hidden;
  box-shadow:var(--card-sh);
  transition:border-color .25s,transform .2s;
}
.stat-card:hover{border-color:var(--border);transform:translateY(-2px)}
.stat-card-icon{
  font-size:1.8rem;
  position:absolute;top:.8rem;left:1rem;
  opacity:.12;
}
.stat-card-label{font-size:.76rem;color:var(--muted);margin-bottom:.4rem}
.stat-card-value{font-size:1.4rem;font-weight:800}
.val-gold{color:var(--gold)}
.val-green{color:var(--green)}
.val-red{color:var(--red)}
.val-purple{color:var(--purple)}

/* ════ ACTION BUTTONS ════ */
.actions-grid {
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:.7rem;margin-bottom:1.4rem;
}
@media(max-width:420px){.actions-grid{grid-template-columns:repeat(2,1fr)}}
.action-btn {
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border2);
  border-radius:16px;padding:.9rem .5rem;
  display:flex;flex-direction:column;align-items:center;gap:.45rem;
  cursor:pointer;text-decoration:none;
  transition:border-color .2s,transform .2s,box-shadow .2s;
}
.action-btn:hover{
  border-color:var(--border);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.action-btn:active{transform:translateY(0) scale(.97)}
.action-icon{font-size:1.5rem}
.action-lbl{font-size:.7rem;font-weight:600;color:var(--muted);text-align:center}

/* ════ SECTION HEADER ════ */
.sec-hdr {
  display:flex;align-items:center;gap:.5rem;
  font-size:.95rem;font-weight:700;color:var(--text);
  margin-bottom:.9rem;padding-bottom:.6rem;
  border-bottom:1px solid var(--border2);
}
.sec-hdr-dot{
  width:4px;height:16px;border-radius:2px;
  background:linear-gradient(to bottom,var(--gold),var(--gold2));
}

/* ════ ACHIEVEMENTS ════ */
.ach-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:.75rem;margin-bottom:1.4rem;
}
.ach-item {
  background:rgba(255,255,255,.025);
  border:1px solid var(--border2);
  border-radius:14px;
  padding:.75rem;text-align:center;
  transition:transform .2s,border-color .2s;
  opacity:.35;filter:grayscale(.8);
}
.ach-item.earned{
  opacity:1;filter:none;
  border-color:rgba(240,180,41,.3);
  background:rgba(240,180,41,.05);
}
.ach-item:hover{transform:translateY(-2px)}
.ach-icon{font-size:1.5rem;margin-bottom:.35rem}
.ach-name{font-size:.68rem;font-weight:700;color:var(--text)}

/* ════ LEADERBOARD ════ */
.lb-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.4rem}
.lb-item {
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border2);
  border-radius:14px;
  padding:.8rem 1rem;
  display:flex;align-items:center;gap:.8rem;
  transition:border-color .2s;
}
.lb-item.is-me{
  border-color:rgba(240,180,41,.35);
  background:rgba(240,180,41,.04);
}
.lb-rank{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:900;
  background:rgba(255,255,255,.05);
  border-radius:10px;flex-shrink:0;
}
.lb-rank.gold{background:rgba(240,180,41,.15);color:var(--gold)}
.lb-rank.silver{background:rgba(192,192,192,.1);color:#c0c0c0}
.lb-rank.bronze{background:rgba(205,127,50,.1);color:#cd7f32}
.lb-name{flex:1;font-size:.9rem;font-weight:600;color:var(--text)}
.lb-me-tag{font-size:.68rem;color:var(--gold);font-weight:700;margin-right:.3rem}
.lb-amount{font-size:.9rem;font-weight:700;color:var(--gold)}

/* ════ TRANSACTIONS ════ */
.tx-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.4rem}
.tx-item {
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border2);
  border-radius:14px;padding:.8rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  animation:txSlide .35s ease both;
}
@keyframes txSlide{
  from{opacity:0;transform:translateX(16px)}
  to{opacity:1;transform:translateX(0)}
}
.tx-left{flex:1;min-width:0}
.tx-desc{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-time{font-size:.72rem;color:var(--muted);margin-top:.2rem}
.tx-amount{font-size:.95rem;font-weight:800;flex-shrink:0;margin-right:.5rem}
.tx-pos{color:var(--green)}
.tx-neg{color:var(--red)}

/* ════ ENTER ID FORM ════ */
.id-form {
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);
  border-radius:24px;padding:2rem;text-align:center;
  box-shadow:var(--card-sh);
  max-width:380px;margin:2rem auto;
}
.id-form h2{font-size:1.3rem;font-weight:800;margin-bottom:.5rem}
.id-form p{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.id-input {
  width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:.85rem 1rem;
  font-size:1rem;font-family:'Tajawal',sans-serif;
  color:var(--text);text-align:center;
  transition:border-color .2s;
  margin-bottom:.9rem;
}
.id-input:focus{outline:none;border-color:rgba(240,180,41,.4)}
.id-input::placeholder{color:var(--muted)}
.id-submit {
  width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;border:none;
  padding:.9rem;border-radius:12px;
  font-size:1rem;font-weight:800;font-family:'Tajawal',sans-serif;
  cursor:pointer;transition:transform .2s,opacity .2s;
}
.id-submit:hover{transform:scale(1.02);opacity:.92}
.id-hint{
  font-size:.75rem;color:var(--muted);
  background:rgba(255,255,255,.03);
  border:1px solid var(--border2);
  border-radius:10px;padding:.75rem;
  margin-top:.9rem;line-height:1.7;
}

/* ════ TOAST ════ */
.toast {
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--border);
  border-radius:50px;padding:.6rem 1.4rem;
  font-size:.85rem;font-weight:600;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;
  white-space:nowrap;z-index:9999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════ FOOTER ════ */
.footer {
  text-align:center;
  padding:1.5rem 1rem;
  border-top:1px solid var(--border2);
  margin-top:.5rem;
  color:var(--muted);font-size:.78rem;
}
.footer a{color:var(--gold);text-decoration:none;font-weight:700}

/* ════ REFRESH BTN ════ */
.refresh-btn {
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(240,180,41,.1);color:var(--gold);
  border:1px solid rgba(240,180,41,.2);
  border-radius:50px;
  padding:.55rem 1.2rem;font-size:.82rem;font-weight:700;
  font-family:'Tajawal',sans-serif;cursor:pointer;
  transition:background .2s,transform .2s;
}
.refresh-btn:hover{background:rgba(240,180,41,.18);transform:scale(1.03)}
.refresh-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════ RESPONSIVE ════ */
@media(max-width:500px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .balance-num{font-size:2.4rem}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loader-logo">KOBBTAN</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div class="loader-text">جارٍ تحميل بياناتك...</div>
</div>

<!-- ERROR -->
<div id="error-screen">
  <div style="font-size:3rem">⚠️</div>
  <div style="font-size:1.1rem;font-weight:700">خطأ في الاتصال</div>
  <div id="error-msg" style="color:var(--muted);font-size:.85rem;max-width:280px;line-height:1.6"></div>
  <button class="refresh-btn" onclick="location.reload()">
    إعادة المحاولة
  </button>
</div>

<!-- INTRO OVERLAY -->
<div id="intro-overlay">
  <div class="intro-glow"></div>
  <div id="intro-particles" class="intro-particles"></div>

  <div id="iph1" class="intro-phase active">
    <div class="intro-big-icon">🏁</div>
    <div class="intro-title">انتهى السيزون الأول</div>
    <div class="intro-divider"></div>
    <div class="intro-sub">شكراً لمشاركتك في الموسم الأول!<br>أرباحك وسجلك محفوظان.</div>
    <div class="countdown-strip"><div class="countdown-fill" id="cf1" style="width:100%"></div></div>
  </div>

  <div id="iph2" class="intro-phase">
    <div class="intro-big-icon">🎉</div>
    <div class="intro-title">السيزون الثاني<br>بدأ!</div>
    <div class="intro-divider"></div>
    <div class="intro-sub">مكافآت أكبر، تحديات جديدة<br>وفرص ربح لم تشوفها قبل كده!</div>
    <button class="intro-cta" onclick="enterApp()">🚀 ادخل دلوقتي</button>
  </div>

  <div class="intro-progress" style="position:absolute;bottom:5rem">
    <div class="intro-dot active" id="id1"></div>
    <div class="intro-dot" id="id2"></div>
  </div>

  <button class="intro-skip" onclick="enterApp()">تخطي ←</button>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      💰 مكسب كاش
      <div class="nav-brand-dot"></div>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="nav-av">?</div>
      <div class="nav-name" id="nav-nm">تحميل...</div>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="wrap" id="main"></div>

  <!-- FOOTER -->
  <div class="footer">
    متصل مباشرةً بـ
    <a href="https://kobbtan.com" target="_blank">kobbtan.com</a>
    &nbsp;·&nbsp;
    <button class="refresh-btn" onclick="refreshAll()" id="refresh-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      تحديث
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//  CONFIG  -  ✏️ غيّر لو الـ API على سيرفر تاني
// ══════════════════════════════════════════
const API = 'https://kobbtan.com/api';
// لو شغّال locally بدون nginx:
// const API = 'http://localhost:5000/api';

const BOT_USERNAME = 'K0BBTAN_bot'; // ✏️ غيّر لاسم البوت

// ══════════════════════════════════════════
//  INTRO PARTICLES
// ══════════════════════════════════════════
(function spawnParticles() {
  const c = document.getElementById('intro-particles');
  for (let i = 0; i < 50; i++) {
    const d = document.createElement('div');
    const sz = Math.random() * 3 + 1;
    const dur = 2 + Math.random() * 4;
    const del = Math.random() * 5;
    Object.assign(d.style, {
      position: 'absolute',
      width: sz + 'px', height: sz + 'px',
      borderRadius: '50%',
      background: '#f0b429',
      top: Math.random() * 100 + '%',
      left: Math.random() * 100 + '%',
      opacity: '0',
      animation: `twinkle ${dur}s ${del}s ease-in-out infinite`,
    });
    c.appendChild(d);
  }
  // inject keyframes
  const s = document.createElement('style');
  s.textContent = `@keyframes twinkle{0%,100%{opacity:0;transform:scale(1)}50%{opacity:.8;transform:scale(1.5)}}`;
  document.head.appendChild(s);
})();

// ══════════════════════════════════════════
//  INTRO LOGIC
// ══════════════════════════════════════════
let _introTimer = null;

function startIntro() {
  let pct = 100;
  const fill = document.getElementById('cf1');
  _introTimer = setInterval(() => {
    pct -= 100 / 35;
    fill.style.width = Math.max(0, pct) + '%';
    if (pct <= 0) {
      clearInterval(_introTimer);
      toPhase2();
    }
  }, 100);
}

function toPhase2() {
  const p1 = document.getElementById('iph1');
  p1.classList.add('exit');
  setTimeout(() => {
    p1.classList.remove('active', 'exit');
    document.getElementById('iph2').classList.add('active');
    document.getElementById('id1').classList.remove('active');
    document.getElementById('id2').classList.add('active');
    // confetti burst
    burstConfetti();
  }, 500);
}

function burstConfetti() {
  const colors = ['#f0b429','#ff6b6b','#4ecdc4','#45b7d1','#fd79a8'];
  for (let i = 0; i < 35; i++) {
    const d = document.createElement('div');
    const sz = 6 + Math.random() * 8;
    Object.assign(d.style, {
      position: 'fixed',
      width: sz + 'px', height: sz + 'px',
      borderRadius: '2px',
      background: colors[Math.floor(Math.random() * colors.length)],
      left: Math.random() * 100 + '%',
      top: '-20px',
      zIndex: '9001',
      animation: `cfall ${2 + Math.random() * 2}s ${Math.random()}s linear forwards`,
      opacity: '0',
    });
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 4000);
  }
  const s = document.createElement('style');
  s.textContent = `@keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}`;
  document.head.appendChild(s);
}

function enterApp() {
  clearInterval(_introTimer);
  const ov = document.getElementById('intro-overlay');
  ov.style.transition = 'opacity .7s ease';
  ov.style.opacity = '0';
  setTimeout(() => {
    ov.style.display = 'none';
    initApp();
  }, 700);
}

// ══════════════════════════════════════════
//  USER ID
// ══════════════════════════════════════════
function getUserId() {
  const p = new URLSearchParams(location.search);
  if (p.get('id')) return p.get('id');
  if (location.hash) return location.hash.slice(1);
  return localStorage.getItem('kobbtan_uid');
}

// ══════════════════════════════════════════
//  API
// ══════════════════════════════════════════
async function apiFetch(path) {
  const res = await fetch(API + path);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
let _user = null, _lb = null;

async function initApp() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');

  const uid = getUserId();
  if (!uid) { renderIdForm(); return; }
  localStorage.setItem('kobbtan_uid', uid);
  await loadAll(uid);
}

async function loadAll(uid) {
  showLoading(true);
  try {
    const [user, txs, lb] = await Promise.all([
      apiFetch('/user/' + uid),
      apiFetch('/user/' + uid + '/transactions?limit=10'),
      apiFetch('/leaderboard?limit=10'),
    ]);
    showLoading(false);

    if (!user || user.error) {
      renderIdFormError();
      return;
    }

    _user = user; _lb = lb;
    renderDashboard(user, txs, lb, uid);
    document.getElementById('nav-av').textContent = (user.full_name || 'U')[0].toUpperCase();
    document.getElementById('nav-nm').textContent = user.full_name || 'مستخدم';

  } catch (err) {
    showLoading(false);
    document.getElementById('error-screen').classList.add('show');
    document.getElementById('error-msg').textContent =
      'تأكد إن الـ API شغال على kobbtan.com/api\n' + err.message;
  }
}

function showLoading(on) {
  document.getElementById('loading-screen').style.display = on ? 'flex' : 'none';
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  const uid = getUserId();
  if (uid) await loadAll(uid);
  btn.classList.remove('spinning');
  showToast('✅ تم التحديث');
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
const LEVELS = [
  {name:'مبتدئ 🌱',min:0},
  {name:'نشيط ⚡',min:10},
  {name:'متقدم 🔥',min:30},
  {name:'خبير 💎',min:75},
  {name:'نخبة 👑',min:150},
  {name:'أسطورة 🌟',min:300},
];

const ACH_MAP = {
  first_task:    {icon:'✅',name:'أول مهمة'},
  tasks_10:      {icon:'🎯',name:'منجز'},
  tasks_50:      {icon:'⚡',name:'محترف'},
  referral_1:    {icon:'🔗',name:'مُرشِّد'},
  referral_10:   {icon:'👥',name:'قائد'},
  referral_50:   {icon:'🌍',name:'السفير'},
  streak_7:      {icon:'🔥',name:'ملتزم ٧'},
  streak_30:     {icon:'🏆',name:'أسطورة الالتزام'},
  withdraw_first:{icon:'💸',name:'أول سحب'},
  vip_member:    {icon:'⭐',name:'VIP'},
  wheel_jackpot: {icon:'🎰',name:'جاكبوت'},
};

function renderDashboard(user, txs, lb, myId) {
  const initials = (user.full_name || 'U')[0].toUpperCase();
  const lvl   = LEVELS[user.level] || LEVELS[0];
  const nextLvl = LEVELS[user.level + 1];
  const xpPct = nextLvl
    ? Math.min(100, ((user.total_earned - lvl.min) / (nextLvl.min - lvl.min)) * 100)
    : 100;

  const myRank = lb.findIndex(u => String(u.user_id) === String(myId)) + 1;
  const earned = JSON.parse(user.achievements || '[]');

  const achHTML = Object.entries(ACH_MAP).map(([k, a]) => `
    <div class="ach-item ${earned.includes(k) ? 'earned' : ''}">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
    </div>
  `).join('');

  const lbHTML = lb.slice(0, 10).map((u, i) => {
    const rc = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const me = String(u.user_id) === String(myId);
    const badge = i < 3 ? ['🥇','🥈','🥉'][i] : (i + 1);
    return `
      <div class="lb-item ${me ? 'is-me' : ''}">
        <div class="lb-rank ${rc}">${badge}</div>
        <div class="lb-name">${u.full_name || 'مجهول'} ${me ? '<span class="lb-me-tag">← أنت</span>' : ''}</div>
        <div class="lb-amount">${u.total_earned.toFixed(1)} ج</div>
      </div>`;
  }).join('');

  const txHTML = (txs || []).slice(0, 8).map((tx, i) => `
    <div class="tx-item" style="animation-delay:${i * .05}s">
      <div class="tx-left">
        <div class="tx-desc">${tx.description || tx.type}</div>
        <div class="tx-time">${fmtDate(tx.created_at)}</div>
      </div>
      <div class="tx-amount ${tx.amount >= 0 ? 'tx-pos' : 'tx-neg'}">
        ${tx.amount >= 0 ? '+' : ''}${tx.amount.toFixed(2)} ج
      </div>
    </div>`).join('') || `<div style="color:var(--muted);text-align:center;padding:1rem;font-size:.85rem">لا توجد معاملات بعد</div>`;

  const refLink = `https://t.me/${BOT_USERNAME}?start=REF${user.user_id}`;

  document.getElementById('main').innerHTML = `
    <!-- HERO -->
    <div class="hero-card">
      <div class="hero-top">
        <div class="avatar-ring">${initials}</div>
        <div class="hero-info">
          <div class="hero-name">${user.full_name || 'مستخدم'}</div>
          <div class="hero-id">ID: ${user.user_id}</div>
          <div class="badges">
            ${user.is_vip ? '<span class="badge badge-vip">⭐ VIP</span>' : ''}
            <span class="badge badge-level">${lvl.name}</span>
            ${user.streak > 2 ? `<span class="badge badge-streak">🔥 ${user.streak} يوم</span>` : ''}
            ${myRank > 0 ? `<span class="badge badge-rank">#${myRank}</span>` : ''}
          </div>
        </div>
      </div>

      <div class="balance-block">
        <div class="balance-num">${user.balance.toFixed(2)}</div>
        <div class="balance-unit">جنيه مصري</div>
      </div>

      <div class="mini-stats">
        <div class="mstat">
          <div class="mstat-val">${user.total_earned.toFixed(1)}</div>
          <div class="mstat-lbl">إجمالي الأرباح</div>
        </div>
        <div class="mstat">
          <div class="mstat-val">${user.ref_count}</div>
          <div class="mstat-lbl">الدعوات</div>
        </div>
        <div class="mstat">
          <div class="mstat-val">${user.tasks_done}</div>
          <div class="mstat-lbl">مهام منجزة</div>
        </div>
      </div>

      <div class="xp-wrap">
        <div class="xp-labels">
          <span>${lvl.name}</span>
          <span>${nextLvl ? nextLvl.name : '🏆 أقصى مستوى'}</span>
        </div>
        <div class="xp-track"><div class="xp-fill" id="xf" style="width:0%"></div></div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-icon">💸</div>
        <div class="stat-card-label">إجمالي المسحوب</div>
        <div class="stat-card-value val-gold">${user.total_withdrawn.toFixed(2)} ج</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">🔥</div>
        <div class="stat-card-label">أيام متتالية</div>
        <div class="stat-card-value ${user.streak > 5 ? 'val-gold' : ''}">${user.streak} يوم</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">🎯</div>
        <div class="stat-card-label">مهام مكتملة</div>
        <div class="stat-card-value val-green">${user.tasks_done}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon">👥</div>
        <div class="stat-card-label">دعوات مباشرة</div>
        <div class="stat-card-value val-purple">${user.ref_count}</div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-grid">
      <a class="action-btn" href="https://t.me/${BOT_USERNAME}" target="_blank">
        <div class="action-icon">🤖</div>
        <div class="action-lbl">فتح البوت</div>
      </a>
      <div class="action-btn" onclick="shareRef('${refLink}')">
        <div class="action-icon">🔗</div>
        <div class="action-lbl">رابط دعوتي</div>
      </div>
      <div class="action-btn" onclick="copyText('${user.ref_code}', 'تم نسخ كود الدعوة ✅')">
        <div class="action-icon">📋</div>
        <div class="action-lbl">كود الدعوة</div>
      </div>
      <div class="action-btn" onclick="refreshAll()">
        <div class="action-icon">🔄</div>
        <div class="action-lbl">تحديث</div>
      </div>
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="sec-hdr"><div class="sec-hdr-dot"></div>🏅 الإنجازات</div>
    <div class="ach-grid">${achHTML}</div>

    <!-- LEADERBOARD -->
    <div class="sec-hdr"><div class="sec-hdr-dot"></div>🏆 لوحة المتصدرين</div>
    <div class="lb-list">${lbHTML}</div>

    <!-- TRANSACTIONS -->
    <div class="sec-hdr"><div class="sec-hdr-dot"></div>📊 آخر المعاملات</div>
    <div class="tx-list">${txHTML}</div>
  `;

  // animate XP bar
  setTimeout(() => {
    const xf = document.getElementById('xf');
    if (xf) xf.style.width = xpPct + '%';
  }, 400);
}

function renderIdForm() {
  document.getElementById('main').innerHTML = `
    <div class="id-form">
      <div style="font-size:2.5rem;margin-bottom:.8rem">🤖</div>
      <h2>ادخل الـ ID بتاعك</h2>
      <p>ادخل Telegram ID الخاص بك لعرض لوحة التحكم الشخصية</p>
      <input class="id-input" id="uid-in" type="number" placeholder="مثال: 123456789" />
      <button class="id-submit" onclick="doLoadId()">عرض لوحتي 🚀</button>
      <div class="id-hint">
        📌 لمعرفة الـ ID الخاص بك<br>
        افتح البوت على تيليجرام واكتب <b>/start</b><br>
        أو ابعت رسالة لـ <b>@userinfobot</b>
      </div>
    </div>`;
  document.getElementById('nav-nm').textContent = 'مجهول';
}

function renderIdFormError() {
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="id-form">
      <div style="font-size:2rem;color:var(--red)">❌</div>
      <h2 style="color:var(--red)">المستخدم مش موجود</h2>
      <p>تأكد من الـ ID وإنك مسجل في البوت</p>
      <input class="id-input" id="uid-in" type="number" placeholder="أدخل ID صحيح" />
      <button class="id-submit" onclick="doLoadId()">حاول تاني 🔄</button>
    </div>`;
}

function doLoadId() {
  const val = (document.getElementById('uid-in') || {}).value;
  if (!val || isNaN(val)) {
    document.getElementById('uid-in').style.borderColor = 'var(--red)';
    return;
  }
  localStorage.setItem('kobbtan_uid', val);
  loadAll(val);
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('ar-EG', {month:'short', day:'numeric'}) + ' ' +
           d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
  } catch { return iso.slice(0,16); }
}

function copyText(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  if (msg) showToast(msg);
}

function shareRef(url) {
  if (navigator.share) {
    navigator.share({title: 'انضم لمكسب كاش 💰', url});
  } else {
    copyText(url, '✅ تم نسخ رابط الدعوة');
  }
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
window.onload = function() {
  document.getElementById('loading-screen').style.display = 'none';
  startIntro();
};
</script>
</body>
</html>
