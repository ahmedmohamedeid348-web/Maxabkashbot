<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 بوت الكسب - لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c518;
    --gold2: #e8a900;
    --dark: #0a0c14;
    --dark2: #111420;
    --dark3: #1a1f30;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(245,197,24,0.2);
    --text: #e8e8f0;
    --muted: #8890aa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SEASON INTRO ===== */
  #season-intro {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050710;
    overflow: hidden;
  }

  .stars-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 30%, rgba(245,197,24,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(245,197,24,0.03) 0%, transparent 60%);
  }

  .star-particle {
    position: absolute;
    background: #f5c518;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .lantern {
    position: absolute;
    font-size: 3rem;
    animation: swing 3s ease-in-out infinite;
    transform-origin: top center;
  }
  .lantern-1 { top: 5%; left: 8%; animation-delay: 0s; }
  .lantern-2 { top: 3%; left: 28%; animation-delay: 0.5s; font-size: 2.4rem; }
  .lantern-3 { top: 6%; right: 12%; animation-delay: 1s; }

  @keyframes swing {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  .moon {
    position: absolute;
    top: 4%;
    right: 5%;
    font-size: 5rem;
    filter: drop-shadow(0 0 20px rgba(245,197,24,0.6));
    animation: moonGlow 4s ease-in-out infinite;
  }

  @keyframes moonGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(245,197,24,0.6)); }
    50% { filter: drop-shadow(0 0 40px rgba(245,197,24,0.9)); }
  }

  .intro-content {
    text-align: center;
    position: relative;
    z-index: 10;
    padding: 2rem;
  }

  .intro-phase {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    animation: fadeInUp 0.8s ease forwards;
  }

  .intro-phase.active { display: flex; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeOutUp {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-40px); }
  }

  .intro-phase.exit { animation: fadeOutUp 0.6s ease forwards; }

  .phase-emoji {
    font-size: 4.5rem;
    filter: drop-shadow(0 0 20px rgba(245,197,24,0.5));
    animation: emojiPop 0.5s ease 0.3s both;
  }

  @keyframes emojiPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .phase-title {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,197,24,0.5);
    line-height: 1.2;
  }

  .phase-divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto;
  }

  .phase-subtitle {
    font-size: 1.1rem;
    color: var(--muted);
  }

  .season-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #000;
    border: none;
    padding: 1rem 2.5rem;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(245,197,24,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulseBtn 2s ease-in-out infinite;
  }

  @keyframes pulseBtn {
    0%, 100% { box-shadow: 0 0 20px rgba(245,197,24,0.4); }
    50% { box-shadow: 0 0 40px rgba(245,197,24,0.7); }
  }

  .season-btn:hover { transform: scale(1.05); }

  .countdown-bar {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 0.5rem;
  }

  .countdown-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold2), var(--gold));
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    opacity: 0;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== MAIN DASHBOARD ===== */
  #dashboard {
    display: none;
    min-height: 100vh;
    background: var(--dark);
  }

  #dashboard.visible { display: block; animation: fadeIn 1s ease; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .top-bar {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border-bottom: 1px solid var(--card-border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .top-bar-logo {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse-dot 1.5s ease infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }

  .user-tag {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--card);
    border: 1px solid var(--card-border);
    padding: 0.5rem 1rem;
    border-radius: 50px;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: #000;
    font-weight: 700;
  }

  .main-content {
    padding: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
  }

  /* Loading screen */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: var(--dark);
    z-index: 8888;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }

  .loader-ring {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(245,197,24,0.2);
    border-top: 3px solid var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* Error screen */
  #error-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--dark);
    z-index: 8888;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    text-align: center;
    padding: 2rem;
  }

  #error-screen.show { display: flex; }

  /* Profile Card */
  .profile-hero {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .profile-hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(245,197,24,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .profile-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .profile-avatar-big {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 900;
    color: #000;
    flex-shrink: 0;
    border: 3px solid rgba(245,197,24,0.3);
    box-shadow: 0 0 20px rgba(245,197,24,0.2);
  }

  .profile-info { flex: 1; min-width: 0; }

  .profile-name {
    font-size: 1.3rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .profile-id {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 0.2rem;
  }

  .badges-row {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }

  .badge {
    padding: 0.2rem 0.6rem;
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .badge-vip { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; }
  .badge-level { background: rgba(245,197,24,0.2); color: var(--gold); border: 1px solid rgba(245,197,24,0.3); }
  .badge-streak { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

  .balance-display {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .balance-amount {
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 20px rgba(245,197,24,0.3);
  }

  .balance-currency {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .stats-mini-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
  }

  .stat-mini {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 0.8rem;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .stat-mini-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold);
  }

  .stat-mini-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  /* XP Bar */
  .xp-section {
    margin-top: 1rem;
  }

  .xp-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .xp-bar-outer {
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold2), var(--gold));
    border-radius: 4px;
    transition: width 1s ease;
  }

  /* Cards Grid */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 500px) {
    .cards-grid { grid-template-columns: 1fr; }
  }

  .info-card {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 1.2rem;
    position: relative;
    overflow: hidden;
  }

  .info-card::after {
    content: attr(data-icon);
    position: absolute;
    top: 0.8rem;
    left: 1rem;
    font-size: 1.8rem;
    opacity: 0.15;
  }

  .card-title {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .card-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .card-value.gold { color: var(--gold); }
  .card-value.green { color: #22c55e; }
  .card-value.red { color: #ef4444; }
  .card-value.purple { color: #a855f7; }

  /* Achievements */
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .achievements-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }

  .achievement-item {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 0.8rem;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
  }

  .achievement-item.earned {
    border-color: rgba(245,197,24,0.4);
    background: rgba(245,197,24,0.06);
  }

  .achievement-item:hover { transform: translateY(-2px); }

  .achievement-icon { font-size: 1.6rem; margin-bottom: 0.4rem; }

  .achievement-name {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text);
  }

  .achievement-desc {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .achievement-item:not(.earned) { opacity: 0.4; filter: grayscale(1); }

  /* Transactions */
  .transactions-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .tx-item {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideIn 0.4s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .tx-desc {
    font-size: 0.85rem;
    color: var(--text);
  }

  .tx-time {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .tx-amount {
    font-weight: 700;
    font-size: 0.95rem;
  }

  .tx-amount.positive { color: #22c55e; }
  .tx-amount.negative { color: #ef4444; }

  /* Leaderboard */
  .leaderboard-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .lb-item {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    transition: transform 0.2s;
  }

  .lb-item:hover { transform: translateX(-4px); }

  .lb-item.me {
    border-color: rgba(245,197,24,0.5);
    background: rgba(245,197,24,0.06);
  }

  .lb-rank {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }

  .lb-rank.gold { background: linear-gradient(135deg, #f5c518, #e8a900); color: #000; }
  .lb-rank.silver { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #000; }
  .lb-rank.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }

  .lb-name { flex: 1; font-size: 0.9rem; font-weight: 600; }
  .lb-amount { font-size: 0.9rem; color: var(--gold); font-weight: 700; }

  /* CTA Buttons */
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 2rem;
  }

  .action-btn {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s, border-color 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .action-btn:hover {
    transform: translateY(-3px);
    border-color: rgba(245,197,24,0.5);
    background: linear-gradient(135deg, rgba(245,197,24,0.08), var(--dark3));
  }

  .action-btn-icon { font-size: 1.8rem; }
  .action-btn-label { font-size: 0.85rem; font-weight: 600; }

  /* No user state */
  .enter-id-box {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 2rem;
    text-align: center;
    margin: 2rem auto;
    max-width: 400px;
  }

  .enter-id-box h2 {
    font-size: 1.4rem;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .enter-id-box p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .id-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
    text-align: center;
    direction: ltr;
  }

  .id-input:focus { border-color: var(--gold); }

  .id-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #000;
    border: none;
    padding: 0.9rem;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .id-submit:hover { opacity: 0.9; }

  .telegram-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.8rem;
    line-height: 1.5;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Intro progress dots */
  .progress-dots {
    display: flex;
    gap: 0.4rem;
    justify-content: center;
    margin-top: 1rem;
  }

  .progress-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }

  .progress-dot.active { background: var(--gold); }

  .skip-btn {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .skip-btn:hover { color: var(--text); }
</style>
</head>
<body>

<!-- ===== LOADING ===== -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">جارٍ تحميل بياناتك...</div>
</div>

<!-- ===== ERROR ===== -->
<div id="error-screen">
  <div style="font-size:3rem">⚠️</div>
  <div style="font-size:1.2rem;font-weight:700">خطأ في الاتصال</div>
  <div id="error-msg" style="color:var(--muted);font-size:0.9rem;max-width:300px"></div>
  <button class="refresh-btn" onclick="location.reload()">🔄 إعادة المحاولة</button>
</div>

<!-- ===== SEASON INTRO ===== -->
<div id="season-intro">
  <div class="stars-bg"></div>

  <!-- Stars -->
  <div id="stars-container"></div>

  <!-- Lanterns & Moon -->
  <div class="lantern lantern-1">🏮</div>
  <div class="lantern lantern-2">🏮</div>
  <div class="lantern lantern-3">🏮</div>
  <div class="moon">🌙</div>

  <!-- Confetti container -->
  <div id="confetti-container"></div>

  <div class="intro-content">
    <!-- Phase 1: Season 1 End -->
    <div class="intro-phase active" id="phase1">
      <div class="phase-emoji">🏁</div>
      <div class="phase-title">انتهى السيزون الأول</div>
      <div class="phase-divider"></div>
      <div class="phase-subtitle">شكراً لمشاركتك في الموسم الأول!</div>
      <div class="countdown-bar"><div class="countdown-fill" id="fill1" style="width:100%"></div></div>
    </div>

    <!-- Phase 2: Season 2 Start -->
    <div class="intro-phase" id="phase2">
      <div class="phase-emoji">🎉</div>
      <div class="phase-title">بداية السيزون<br>الثاني</div>
      <div class="phase-divider"></div>
      <div class="phase-subtitle">🌙 مكافآت وجوائز جديدة تنتظرك!</div>
      <button class="season-btn" onclick="enterDashboard()">🚀 ابدأ الآن!</button>
    </div>

    <div class="progress-dots">
      <div class="progress-dot active" id="dot1"></div>
      <div class="progress-dot" id="dot2"></div>
    </div>
  </div>

  <button class="skip-btn" onclick="enterDashboard()">تخطي ←</button>
</div>

<!-- ===== MAIN DASHBOARD ===== -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-bar-logo">
      💰 بوت الكسب
      <div class="live-dot" title="متصل بالبوت"></div>
    </div>
    <div class="user-tag">
      <div class="user-avatar" id="nav-avatar">?</div>
      <span id="nav-name">تحميل...</span>
    </div>
  </div>

  <div class="main-content" id="main-content">
    <!-- will be filled by JS -->
  </div>

  <div class="footer">
    🤖 متصل بالبوت مباشرةً
    <br>
    <button class="refresh-btn" onclick="refreshData()">🔄 تحديث البيانات</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//   CONFIG - غيّر الرابط لرابط الـ API بتاعك
// ═══════════════════════════════════════════════
const API_BASE = window.location.origin + '/api';
// لو الداشبورد على سيرفر مختلف، غيّر لـ:
// const API_BASE = 'http://YOUR_SERVER_IP:5000/api';

// ═══════════════════════════════════════════════
//   STARS GENERATION
// ═══════════════════════════════════════════════
function createStars() {
  const c = document.getElementById('stars-container');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star-particle';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    c.appendChild(s);
  }
}

function createConfetti() {
  const c = document.getElementById('confetti-container');
  const colors = ['#f5c518','#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7','#fd79a8'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${2+Math.random()*2}s;
      animation-delay:${Math.random()*1}s;
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
    `;
    c.appendChild(p);
  }
}

// ═══════════════════════════════════════════════
//   SEASON INTRO LOGIC
// ═══════════════════════════════════════════════
createStars();

let introTimer = null;

function startIntro() {
  // Phase 1: "Season 1 ended" - countdown 3.5s
  let pct = 100;
  const fill1 = document.getElementById('fill1');
  introTimer = setInterval(() => {
    pct -= (100 / 35);
    fill1.style.width = Math.max(0, pct) + '%';
    if (pct <= 0) {
      clearInterval(introTimer);
      transitionToPhase2();
    }
  }, 100);
}

function transitionToPhase2() {
  const p1 = document.getElementById('phase1');
  p1.classList.add('exit');

  setTimeout(() => {
    p1.classList.remove('active', 'exit');
    const p2 = document.getElementById('phase2');
    p2.classList.add('active');
    document.getElementById('dot1').classList.remove('active');
    document.getElementById('dot2').classList.add('active');
    createConfetti();
  }, 600);
}

function enterDashboard() {
  clearInterval(introTimer);
  const intro = document.getElementById('season-intro');
  intro.style.transition = 'opacity 0.8s ease';
  intro.style.opacity = '0';
  setTimeout(() => {
    intro.style.display = 'none';
    initDashboard();
  }, 800);
}

// ═══════════════════════════════════════════════
//   USER ID - AUTO-DETECT FROM URL or localStorage
// ═══════════════════════════════════════════════
function getUserId() {
  // 1. Check URL params: dashboard.html?id=123456789
  const params = new URLSearchParams(window.location.search);
  if (params.get('id')) return params.get('id');

  // 2. Check hash: dashboard.html#123456789
  if (window.location.hash) return window.location.hash.replace('#', '');

  // 3. Check localStorage
  return localStorage.getItem('tg_user_id');
}

// ═══════════════════════════════════════════════
//   INIT DASHBOARD
// ═══════════════════════════════════════════════
async function initDashboard() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('dashboard').classList.add('visible');

  const userId = getUserId();

  if (!userId) {
    showEnterIdForm();
    return;
  }

  localStorage.setItem('tg_user_id', userId);
  await loadUserData(userId);
}

function showEnterIdForm() {
  const c = document.getElementById('main-content');
  c.innerHTML = `
    <div class="enter-id-box">
      <div style="font-size:2.5rem;margin-bottom:0.8rem">🤖</div>
      <h2>ادخل معرفك</h2>
      <p>ادخل الـ Telegram ID بتاعك لعرض لوحة التحكم الشخصية</p>
      <input class="id-input" id="uid-input" type="number" placeholder="مثال: 123456789" />
      <button class="id-submit" onclick="saveAndLoad()">عرض لوحتي 🚀</button>
      <div class="telegram-hint">
        📌 لمعرفة الـ ID بتاعك، افتح البوت على تيليجرام واكتب /start
        <br>أو ابعت رسالة لـ @userinfobot
      </div>
    </div>
  `;
  document.getElementById('nav-name').textContent = 'مجهول';
}

function saveAndLoad() {
  const val = document.getElementById('uid-input').value.trim();
  if (!val || isNaN(val)) {
    document.getElementById('uid-input').style.borderColor = '#ef4444';
    return;
  }
  localStorage.setItem('tg_user_id', val);
  loadUserData(val);
}

// ═══════════════════════════════════════════════
//   API CALLS
// ═══════════════════════════════════════════════
async function apiGet(path) {
  const res = await fetch(API_BASE + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

let userData = null;
let leaderboardData = null;

async function loadUserData(userId) {
  try {
    document.getElementById('loading-screen').style.display = 'flex';

    const [user, txs, lb] = await Promise.all([
      apiGet(`/user/${userId}`),
      apiGet(`/user/${userId}/transactions`),
      apiGet('/leaderboard')
    ]);

    document.getElementById('loading-screen').style.display = 'none';

    if (!user || user.error) {
      showEnterIdForm();
      const c = document.getElementById('main-content');
      c.innerHTML = `
        <div class="enter-id-box">
          <div style="font-size:2rem;color:#ef4444">❌</div>
          <h2 style="color:#ef4444">المستخدم غير موجود</h2>
          <p>التأكد من الـ ID صح وإنك مسجل في البوت</p>
          <input class="id-input" id="uid-input" type="number" placeholder="أدخل ID صحيح" />
          <button class="id-submit" onclick="saveAndLoad()">حاول تاني 🔄</button>
        </div>
      `;
      return;
    }

    userData = user;
    leaderboardData = lb;
    renderDashboard(user, txs, lb, userId);

  } catch (err) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').classList.add('show');
    document.getElementById('error-msg').textContent = 'تأكد إن الـ API شغال على السيرفر. ' + err.message;
  }
}

async function refreshData() {
  const userId = getUserId();
  if (userId) await loadUserData(userId);
}

// ═══════════════════════════════════════════════
//   RENDER DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard(user, txs, lb, myId) {
  // Nav
  const initials = (user.full_name || 'U').charAt(0).toUpperCase();
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-name').textContent = user.full_name || 'مستخدم';

  // Achievements mapping
  const achMap = {
    'first_task':     { icon: '✅', name: 'أول مهمة' },
    'tasks_10':       { icon: '🎯', name: 'منجز' },
    'tasks_50':       { icon: '⚡', name: 'محترف' },
    'referral_1':     { icon: '🔗', name: 'مُرشِّد' },
    'referral_10':    { icon: '👥', name: 'قائد' },
    'referral_50':    { icon: '🌍', name: 'السفير' },
    'streak_7':       { icon: '🔥', name: 'ملتزم 7' },
    'streak_30':      { icon: '🏆', name: 'أسطورة' },
    'withdraw_first': { icon: '💸', name: 'أول سحب' },
    'vip_member':     { icon: '⭐', name: 'VIP' },
    'wheel_jackpot':  { icon: '🎰', name: 'جاكبوت' },
  };

  const earned = JSON.parse(user.achievements || '[]');

  // Level info
  const levels = [
    { name: 'مبتدئ 🌱', min: 0 },
    { name: 'نشيط ⚡', min: 10 },
    { name: 'متقدم 🔥', min: 30 },
    { name: 'خبير 💎', min: 75 },
    { name: 'نخبة 👑', min: 150 },
    { name: 'أسطورة 🌟', min: 300 },
  ];
  const currentLevel = levels[user.level] || levels[0];
  const nextLevel = levels[user.level + 1];
  const xpPct = nextLevel
    ? Math.min(100, ((user.total_earned - currentLevel.min) / (nextLevel.min - currentLevel.min)) * 100)
    : 100;

  // Leaderboard rank
  const myRank = lb.findIndex(u => String(u.user_id) === String(myId)) + 1;

  // Transactions
  const txHTML = (txs || []).slice(0, 8).map((tx, i) => `
    <div class="tx-item" style="animation-delay:${i * 0.06}s">
      <div>
        <div class="tx-desc">${tx.description || tx.type}</div>
        <div class="tx-time">${formatDate(tx.created_at)}</div>
      </div>
      <div class="tx-amount ${tx.amount >= 0 ? 'positive' : 'negative'}">
        ${tx.amount >= 0 ? '+' : ''}${tx.amount.toFixed(2)} ج
      </div>
    </div>
  `).join('');

  // Leaderboard HTML
  const lbHTML = lb.slice(0, 10).map((u, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const isMe = String(u.user_id) === String(myId);
    return `
      <div class="lb-item ${isMe ? 'me' : ''}">
        <div class="lb-rank ${rankClass}">${i < 3 ? ['🥇','🥈','🥉'][i] : i+1}</div>
        <div class="lb-name">${u.full_name || 'مجهول'} ${isMe ? '← أنت' : ''}</div>
        <div class="lb-amount">${u.total_earned.toFixed(1)} ج</div>
      </div>
    `;
  }).join('');

  const c = document.getElementById('main-content');
  c.innerHTML = `
    <!-- Profile Hero -->
    <div class="profile-hero">
      <div class="profile-top">
        <div class="profile-avatar-big">${initials}</div>
        <div class="profile-info">
          <div class="profile-name">${user.full_name || 'مستخدم'}</div>
          <div class="profile-id">ID: ${user.user_id}</div>
          <div class="badges-row">
            ${user.is_vip ? '<span class="badge badge-vip">⭐ VIP</span>' : ''}
            <span class="badge badge-level">${currentLevel.name}</span>
            ${user.streak > 2 ? `<span class="badge badge-streak">🔥 ${user.streak} يوم</span>` : ''}
            ${myRank > 0 ? `<span class="badge badge-level">#${myRank} في الترتيب</span>` : ''}
          </div>
        </div>
      </div>

      <div class="balance-display">
        <div class="balance-amount">${user.balance.toFixed(2)}</div>
        <div class="balance-currency">جنيه مصري</div>
      </div>

      <div class="stats-mini-grid">
        <div class="stat-mini">
          <div class="stat-mini-value">${user.total_earned.toFixed(1)}</div>
          <div class="stat-mini-label">إجمالي الأرباح</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-value">${user.ref_count}</div>
          <div class="stat-mini-label">الدعوات</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-value">${user.tasks_done}</div>
          <div class="stat-mini-label">المهام المنجزة</div>
        </div>
      </div>

      <div class="xp-section">
        <div class="xp-label">
          <span>${currentLevel.name}</span>
          <span>${nextLevel ? nextLevel.name : '🏆 أقصى مستوى'}</span>
        </div>
        <div class="xp-bar-outer">
          <div class="xp-bar-fill" id="xp-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="cards-grid">
      <div class="info-card" data-icon="💸">
        <div class="card-title">إجمالي المسحوب</div>
        <div class="card-value gold">${user.total_withdrawn.toFixed(2)} ج</div>
      </div>
      <div class="info-card" data-icon="🔥">
        <div class="card-title">الأيام المتتالية</div>
        <div class="card-value ${user.streak > 5 ? 'gold' : ''}">${user.streak} يوم</div>
      </div>
      <div class="info-card" data-icon="🎯">
        <div class="card-title">المهام المنجزة</div>
        <div class="card-value green">${user.tasks_done}</div>
      </div>
      <div class="info-card" data-icon="👥">
        <div class="card-title">دعوات مباشرة</div>
        <div class="card-value purple">${user.ref_count}</div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-grid">
      <a class="action-btn" href="https://t.me/${BOT_USERNAME}" target="_blank">
        <div class="action-btn-icon">🤖</div>
        <div class="action-btn-label">فتح البوت</div>
      </a>
      <div class="action-btn" onclick="shareBot()">
        <div class="action-btn-icon">🔗</div>
        <div class="action-btn-label">شارك رابطك</div>
      </div>
      <div class="action-btn" onclick="copyRefCode('${user.ref_code}')">
        <div class="action-btn-icon">📋</div>
        <div class="action-btn-label">كود الدعوة</div>
      </div>
      <div class="action-btn" onclick="refreshData()">
        <div class="action-btn-icon">🔄</div>
        <div class="action-btn-label">تحديث</div>
      </div>
    </div>

    <!-- Achievements -->
    <div class="section-title">🏅 الإنجازات</div>
    <div class="achievements-grid">
      ${Object.entries(achMap).map(([key, ach]) => `
        <div class="achievement-item ${earned.includes(key) ? 'earned' : ''}">
          <div class="achievement-icon">${ach.icon}</div>
          <div class="achievement-name">${ach.name}</div>
        </div>
      `).join('')}
    </div>

    <!-- Leaderboard -->
    <div class="section-title">🏆 لوحة المتصدرين</div>
    <div class="leaderboard-list">${lbHTML}</div>

    <!-- Transactions -->
    <div class="section-title">📊 آخر المعاملات</div>
    <div class="transactions-list">${txHTML || '<div style="color:var(--muted);text-align:center;padding:1rem">لا توجد معاملات بعد</div>'}</div>
  `;

  // Animate XP bar
  setTimeout(() => {
    document.getElementById('xp-fill').style.width = xpPct + '%';
  }, 300);
}

// ═══════════════════════════════════════════════
//   HELPERS
// ═══════════════════════════════════════════════
const BOT_USERNAME = 'YourBotUsername'; // 🔧 غيّر لاسم البوت

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' }) + ' ' +
           d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  } catch { return iso.slice(0, 16); }
}

function shareBot() {
  const userId = getUserId();
  const url = `https://t.me/${BOT_USERNAME}?start=REF${userId}`;
  if (navigator.share) {
    navigator.share({ title: 'انضم لبوت الكسب', url });
  } else {
    copyText(url);
    alert('✅ تم نسخ رابط الدعوة!');
  }
}

function copyRefCode(code) {
  copyText(code);
  alert(`✅ تم نسخ الكود: ${code}`);
}

function copyText(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

// ═══════════════════════════════════════════════
//   BOOT
// ═══════════════════════════════════════════════
window.onload = function() {
  // Hide loading, start intro
  document.getElementById('loading-screen').style.display = 'none';
  startIntro();
};
</script>
</body>
</html>
